<!-- news/templates/dashboards/reader_dashboard.html -->
{% extends "base.html" %}
{% block content %}

<h2>Reader Dashboard</h2>

{% for article in articles %}

<div class="article-card">
    <h3>{{ article.title }}</h3>
    <p>{{ article.body }}</p>
</div>
{% empty %}

<p>No articles available.</p>
{% endfor %}

{% endblock %}
