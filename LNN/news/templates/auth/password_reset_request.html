<!-- news/templates/auth/password_reset_request.html -->
{% extends "base.html" %}
{% block content %}

<h2>Password Reset</h2>

<form method="POST"
      action="{% url 'news:send_password_reset' %}">
    
      {% csrf_token %}
    <p>
        <label>Email:</label>
        <input type="email" name="email">
    </p>
    <button type="submit">Send Reset Email</button>
</form>

{% endblock %}
