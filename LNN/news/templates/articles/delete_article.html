<!-- news/templates/articles/delete_article.html -->
{% extends "base.html" %}
{% block content %}

<h2>Delete Article</h2>

<div class="article-card">
    <p>Are you sure you want to delete:</p>
    
    <h3>{{ article.title }}</h3>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>
</div>

{% endblock %}
